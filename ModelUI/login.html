<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradePyBot - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-btn {
            background: linear-gradient(135deg, #8B5CF6 0%, #EC4899 100%);
        }
        .gradient-btn:hover {
            background: linear-gradient(135deg, #7C3AED 0%, #DB2777 100%);
        }
    </style>
</head>
<body class="min-h-screen bg-white flex items-center justify-center">
    <div class="w-full max-w-md p-8">
        <!-- Logo -->
        <div class="flex justify-center mb-6">
            <div class="w-16 h-16 bg-gradient-to-br from-red-500 to-red-600 rounded-2xl flex items-center justify-center shadow-lg">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
            </div>
        </div>
        
        <!-- Title -->
        <h1 class="text-2xl font-bold text-center text-gray-900 mb-2">Welcome to TradePyBot</h1>
        <p class="text-center text-gray-500 mb-8">Your AI-powered trading assistant</p>
        
        <!-- Token Input -->
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Gateway Token</label>
                <div class="relative">
                    <input type="password" 
                           placeholder="Enter your gateway token" 
                           class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:border-purple-500 focus:outline-none transition-colors">
                    <svg class="w-5 h-5 text-gray-400 absolute right-3 top-1/2 transform -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H5v-2H3v-2H1v-2h2v-2h2v-2h2l3.257-3.257A6 6 0 1121 9z"/>
                    </svg>
                </div>
            </div>
            
            <!-- Login Button -->
            <button class="w-full gradient-btn text-white font-semibold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition-all hover:shadow-lg">
                <span>Login</span>
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                </svg>
            </button>
        </div>
        
        <!-- Forgot Token -->
        <div class="mt-6 text-center">
            <a href="#" class="text-purple-500 hover:text-purple-700 text-sm">Forgot your token?</a>
        </div>
        
        <!-- Footer -->
        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <p class="text-xs text-gray-400">Powered by OpenClaw Gateway</p>
        </div>
    </div>
</body>
</html>
