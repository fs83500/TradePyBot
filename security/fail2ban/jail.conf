# Fail2Ban Configuration for TradePyBot
# File: /etc/fail2ban/jail.d/tradepybot.conf

[tradepybot]
enabled = true
port = http,https
filter = tradepybot
logpath = /var/log/tradepybot/auth.log
maxretry = 3
findtime = 600
bantime = 3600
action = iptables-multiport[name=tradepybot, port="http,https", protocol=tcp]

# Progressif : 1h -> 24h -> 1 semaine
bantime.increment = true
bantime.factor = 24
bantime.maxtime = 604800

# Whitelist IP
ignoreip = 127.0.0.1/8 ::1 192.168.1.0/24