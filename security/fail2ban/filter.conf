# Fail2Ban Filter for TradePyBot
# File: /etc/fail2ban/filter.d/tradepybot.conf

[Definition]
# Match failed login attempts
failregex = ^\s*\[.*\]\s*(ERROR|WARN)\s*Authentication failed for token from <HOST>
            ^\s*\[.*\]\s*(ERROR|WARN)\s*Invalid token attempt from <HOST>
            ^\s*\[.*\]\s*(ERROR|WARN)\s*Rate limited: too many requests from <HOST>

# Ignore successful logins
ignoreregex = ^\s*\[.*\]\s*INFO\s*Successful login from <HOST>

[Init]
# Date pattern
datepattern = %%Y-%%m-%%d %%H:%%M:%%S